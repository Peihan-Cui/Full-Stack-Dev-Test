<!DOCTYPE html>
<html>
<head>
  <title>Select Equipment</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <h2>Select Equipment</h2>
  <p><strong>Job:</strong> {{ job.jobType }} - {{ job.level }}</p>
  <form method="POST">
    <div class="equipment-list">
      {% for category, items in equipment | groupby("category") %}
        <div class="category-section">
          <h3 class="category-title">{{ category }}</h3>
          <div class="category-grid">
            {% for item in items %}
              <label class="equipment-card">
                <input 
                  type="checkbox" 
                  name="equipment" 
                  value="{{ item.id }}"
                  class="equipment-checkbox"
                >
                <div class="card-content">
                  <div class="equipment-title">
                    <strong>{{ item.name }}</strong>
                  </div>
                  <small>{{ item.brand }}</small>
                  <div class="price">
                    ${{ item.baseCost or item.base_cost }}
                  </div>
                </div>
              </label>
            {% endfor %}
          </div>
        </div>
      {% endfor %}
    </div>
    <div class="submit-button-container">
      <a href="/job" class="back-button">Back</a>
      <button type="submit">Generate Quote</button>
    </div>
  </form>
</body>
</html>
